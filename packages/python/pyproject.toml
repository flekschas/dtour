[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "dtour"
version = "0.1.0"
description = "Guided tours through high-dimensional data — interactive WebGPU scatter in Jupyter"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
dependencies = [
  "anywidget>=0.9.21",
  "arro3-core>=0.6.0",
  "arro3-io>=0.6.0",
  "matplotlib>=3.10.8",
  "numpy>=2.4.2",
  "scikit-learn>=1.8.0",
  "umap-learn>=0.5",
]

[project.optional-dependencies]
dev = [
  "matplotlib>=3.9",
  "polars>=1.38.1",
  "pytest>=9.0.2",
  "ruff>=0.15.2",
  "ty>=0.0.18",
  "jupyterlab>=4.5.5",
  "marimo>=0.20.2",
]

[tool.hatch.build.targets.wheel]
packages = ["src/dtour"]
artifacts = ["src/dtour/static/*"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "RUF"]
ignore = []

[tool.pytest.ini_options]
testpaths = ["tests"]
